name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set package version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore SearchEngine.Sharp.sln

      - name: Build
        run: dotnet build SearchEngine.Sharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SearchEngine.Sharp.sln --configuration Release --no-build

      - name: Show package version
        run: echo "Package version $PACKAGE_VERSION"

      - name: Pack
        run: dotnet pack src/SearchEngine.Sharp/SearchEngine.Sharp.csproj --configuration Release --no-build --output ./artifacts /p:PackageVersion=$PACKAGE_VERSION

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
